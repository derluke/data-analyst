---
trigger:
  name: github
  identifier: github
  enabled: true
  stagesToExecute: []
  description: ""
  tags: {}
  encryptedWebhookSecretIdentifier: ""
  orgIdentifier: No_Code_Apps
  projectIdentifier: dataanalyst
  pipelineIdentifier: trivyScan
  source:
    type: Webhook
    spec:
      type: Github
      spec:
        type: PullRequest
        spec:
          connectorRef: account.svc_harness_git1
          autoAbortPreviousExecutions: false
          payloadConditions:
            - key: changedFiles
              operator: Equals
              value: requirements.txt
          headerConditions: []
          repoName: recipe-bob
          actions:
            - Open
            - Synchronize
  pipelineBranchName: main
  inputSetRefs:
    - github
